apiVersion: multica.template/v1
kind: WorkspaceTemplate
metadata:
  name: template-space
  description: "Production-ready template for a product development workspace"
spec:
  targetWorkspace:
    name: "Product Development"
    create: true
    slug: "product-dev"

  workspace:
    name: "Product Development"
    description: "Full-featured workspace for a product engineering team"
    issuePrefix: "PROD"

  labels:
    - name: bug
      color: "#ef4444"
    - name: feature
      color: "#22c55e"
    - name: docs
      color: "#3b82f6"
    - name: infra
      color: "#a855f7"
    - name: security
      color: "#f59e0b"
    - name: design
      color: "#ec4899"

  skills:
    - name: code-review
      description: "Guidelines for reviewing code changes"
      files:
        - path: SKILL.md
          content: |
            # Code Review Skill
            - Check for tests and test coverage
            - Verify no secrets or credentials in code
            - Ensure error handling is present and meaningful
            - Validate input sanitization
            - Confirm documentation is updated for public APIs

    - name: security-audit
      description: "Security-focused review guidelines"
      files:
        - path: SKILL.md
          content: |
            # Security Audit Skill
            - SQL injection vectors
            - XSS (cross-site scripting)
            - CSRF protection
            - Insecure deserialization
            - Missing authentication or authorization checks
            - Dependency vulnerabilities

    - name: on-call-runbook
      description: "On-call incident response procedures"
      files:
        - path: SKILL.md
          content: |
            # On-Call Runbook
            1. Acknowledge the alert within 5 minutes
            2. Assess severity (P1 = outage, P2 = degraded, P3 = minor)
            3. Check dashboards: https://grafana.example.com
            4. If severity is P1, page the on-call manager immediately
            5. Document all actions taken in the incident issue
            6. Schedule a post-mortem within 48 hours for P1/P2

  agents:
    - name: auto-coder
      description: "Autonomous coding agent"
      runtimeId: "91a7efd7-9b8a-4818-94b9-6e3451e32826"
      instructions: |
        You are an autonomous coding agent. Write clean, tested code.
        Always commit your changes. Follow the team's code review guidelines.
      visibility: workspace
      maxConcurrentTasks: 3
      skills:
        - code-review

    - name: security-guardian
      description: "Security review and audit agent"
      runtimeId: "91a7efd7-9b8a-4818-94b9-6e3451e32826"
      instructions: |
        You are a security-focused code reviewer. Always check for:
        SQL injection, XSS, CSRF, insecure deserialization, and missing auth checks.
        Flag any dependency vulnerabilities you notice.
      visibility: workspace
      maxConcurrentTasks: 2
      skills:
        - security-audit

    - name: devops-engineer
      description: "DevOps and infrastructure agent"
      runtimeId: "91a7efd7-9b8a-4818-94b9-6e3451e32826"
      instructions: |
        You are a DevOps engineer. Manage CI/CD pipelines, infrastructure as code,
        and cloud resources. Prefer automation over manual changes.
      visibility: workspace
      maxConcurrentTasks: 3

    - name: product-manager
      description: "Product management and planning agent"
      runtimeId: "91a7efd7-9b8a-4818-94b9-6e3451e32826"
      instructions: |
        You are a product manager. Break down user stories, prioritize the backlog,
        and ensure requirements are clear and testable.
      visibility: workspace
      maxConcurrentTasks: 2

  squads:
    - name: platform-squad
      description: "Platform and infrastructure squad"
      leader: devops-engineer

    - name: product-squad
      description: "Product development squad"
      leader: auto-coder

    - name: security-squad
      description: "Security and compliance squad"
      leader: security-guardian

  autopilots:
    - name: daily-security-scan
      title: "Daily Security Scan"
      agent: security-guardian
      mode: create_issue
      description: |
        Run a daily security scan on the codebase.
        Check for dependency vulnerabilities, leaked secrets, and insecure patterns.
        Create an issue with findings and remediation steps.
      priority: high

    - name: weekly-backlog-grooming
      title: "Weekly Backlog Grooming"
      agent: product-manager
      mode: create_issue
      description: |
        Review the backlog for stale issues, missing labels, and unclear descriptions.
        Suggest priority changes and identify issues ready for estimation.
      priority: medium

    - name: weekly-on-call-review
      title: "Weekly On-Call Review"
      agent: devops-engineer
      mode: create_issue
      description: |
        Review on-call incidents from the past week.
        Check for recurring alerts, flaky monitors, and missing runbook updates.
        Create action items for improving observability.
      priority: medium
